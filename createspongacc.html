<!DOCTYPE html>
<html>
<head>
<title>Create VibeStream Pro Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#050b1e;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.box{
    background:#0d1224;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
}
h2{ color:#3b82f6; }
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#1b2445;
    border:none;
    color:white;
}
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#3b82f6;
    border:none;
    cursor:pointer;
    color:white;
}
button:hover{
    background:#2563eb;
}
.success{ color:#4ade80; font-size:14px; }
.error{ color:#ff4d4d; font-size:14px; }
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<form onsubmit="return createAccount()">
<input type="email" id="newEmail" placeholder="Email" required>
<input type="password" id="newPassword" placeholder="Password" required>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>
<button type="submit">Create Account</button>
</form>

<div id="message"></div>

</div>

<script>
function createAccount(){

    const email = document.getElementById("newEmail").value;
    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;

    if(password !== confirm){
        document.getElementById("message").innerHTML =
        "<div class='error'>Passwords do not match.</div>";
        return false;
    }

    localStorage.setItem("spongEmail", email);
    localStorage.setItem("spongPassword", password);

    document.getElementById("message").innerHTML =
    "<div class='success'>Account created successfully! Redirecting...</div>";

    setTimeout(function(){
        window.location.href="spongtify.html";
    },1500);

    return false;
}
</script>

</body>
</html>
