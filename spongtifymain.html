<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeStream Pro | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; font-family:Arial, sans-serif; }
body { margin:0; background:#050b1e; color:white; display:flex; height:100vh; }

/* Sidebar */
.sidebar { width:220px; background:#0b1028; padding:1rem; display:flex; flex-direction:column; }
.sidebar h1 { color:#3b82f6; text-align:center; }
.sidebar a { color:#aaa; text-decoration:none; margin:0.7rem 0; display:block; }
.sidebar a:hover { color:#3b82f6; }

/* Main */
.main { flex:1; display:flex; flex-direction:column; }

/* Top bar */
.topbar { padding:1rem; background:#0d1224; display:flex; justify-content:space-between; align-items:center; }
.topbar input { width:60%; padding:0.5rem; border:none; border-radius:20px; outline:none; }

/* Content */
.content { padding:1rem; overflow-y:auto; }
.section h2 { margin:1rem 0 0.5rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1rem; }
.card { background:#0d1224; border-radius:10px; padding:0.5rem; text-align:center; cursor:pointer; }
.card img { width:100%; border-radius:8px; }
.card:hover { box-shadow:0 0 15px rgba(59,130,246,0.6); }

/* Player */
.player { height:70px; background:#0b1028; display:flex; align-items:center; justify-content:space-between; padding:0 1rem; }
.controls span { margin:0 10px; cursor:pointer; }
</style>
</head>

<body>

<div class="sidebar">
  <h1>VibeStream Pro</h1>
  <a href="spongtifymain.html">Home</a>
  <a href="library.html">Library</a>
  <a href="playlist.html">Playlists</a>
  <a href="liked_songs.html">Liked Songs</a>
   <a href="account.html">Account</a>
  <a href="spongtify.html">Logout</a>
  
</div>

<div class="main">
  <div class="topbar">
    <input type="text" placeholder="Search songs, artists...">
    <span><a href="account.html">👤</a></span>
  </div>

  <div class="content">
    <div class="section">
      <h2>Made for You</a></h2>
      <div class="grid">
        <div class="card">
          <img src="C:\Users\SBH-CL3-WS01\Desktop\WebDev111\mimasour\dailymix01.jpeg"><p><a href="dailymix01.html">Daily Mix 1</a></p></div>
        <div class="card">
          <img src="C:\Users\SBH-CL3-WS01\Desktop\WebDev111\mimasour\dailymix02.jpeg"><p><a href="dailymix02.html">Daily Mix 2</a></p></div>
        <div class="card">
          <img src="C:\Users\SBH-CL3-WS01\Desktop\WebDev111\mimasour\dailymix03.jpeg"><p><a href="dailymix03.html">Daily Mix 3</a></p></div>
      </div>
    </div>

    <div class="section">
      <h3>Recently Played</h3>
      <div class="grid">
        <div class="card" onclick="playSong('music/requiem-mass.mp3','Requiem Mass','Lappy')">
          <img src="C:\Users\SBH-CL3-WS01\Desktop\WebDev111\mimasour\requiem-mass.jpeg"><p>Requiem Mass</p></div>
        <div class="card" onclick="playSong('music/zwillingstürmeimherbst.mp3','Zwillingstürme im Herbst','Lappy')">
          <img src="C:\Users\SBH-CL3-WS01\Desktop\WebDev111\mimasour\zwillingstürmeimherbst.jpeg"><p>Zwillingstürme im Herbst</p></div>
      </div>
    </div>
  </div>

  <div class="player">
    <div>🎵 Now Playing: <b id="song-title">Nothing Yet</b></div>
    <div class="controls">
      <span id="prev">⏮</span>
      <span id="play">▶</span>
      <span id="next">⏭</span>
    </div>
    <audio id="audio-player" src="" preload="auto"></audio>
  </div>
</div>

<script>
const player = document.getElementById('audio-player');
const title = document.getElementById('song-title');
const playBtn = document.getElementById('play');

function playSong(src, songName, artist) {
  player.src = src;
  player.play();
  title.textContent = songName + " - " + artist;
  playBtn.textContent = '⏸';
}

playBtn.addEventListener('click', () => {
  if (player.paused) { player.play(); playBtn.textContent='⏸'; }
  else { player.pause(); playBtn.textContent='▶'; }
});
</script>

</body>
</html>
