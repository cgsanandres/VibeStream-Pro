

<!DOCTYPE html>
<html>
<head>
<title>VibeStream Pro | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#050b1e;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.box{
    background:#0d1224;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
}
h2{ color:#3b82f6; }
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#1b2445;
    border:none;
    color:white;
}
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#3b82f6;
    border:none;
    cursor:pointer;
    color:white;
}
button:hover{
    background:#2563eb;
}
a{
    color:#aaa;
    display:block;
    margin-top:15px;
    text-decoration:none;
}
a:hover{ color:#3b82f6; }
.error{ color:#ff4d4d; font-size:14px; }
</style>
</head>

<body>

<div class="box">
<h2>VibeStream Pro Login</h2>

<form onsubmit="return login()">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<div class="error" id="errorMsg"></div>

<a href="createspongacc.html">Create Account</a>
</div>

<script>
function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const savedEmail = localStorage.getItem("spongEmail");
    const savedPassword = localStorage.getItem("spongPassword");

    if(email === savedEmail && password === savedPassword){
        localStorage.setItem("spongLoggedIn","true");
        window.location.href="spongtifymain.html";
        return false;
    } else {
        document.getElementById("errorMsg").innerText="Invalid email or password.";
        return false;
    }
}
</script>

</body>
</html>
